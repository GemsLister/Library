<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style/style.css">
    <script defer src="script/script.js"></script>
</head>
<body>
    <header>
        <h1>My Library</h1>
        <button id="show-form-btn">+ Add Book</button>
    </header>
    <hr>
    
    <main>
        <form action="" id="form">
            <input type="text" placeholder="Title" id="title" required>
            <input type="text" placeholder="Author" id="author" required>
            <input type="number" placeholder="Pages" id="pages" required>
            <div class="radios">
                <input type="radio" id="read" value="read" name="read_status">
                <label for="read" name="read_status">Read</label>
                <input type="radio" id="not-read" value="read" name="read_status">
                <label for="not-read" name="read_status">Not Read</label>
            </div>
            <button id="submit-btn">Submit</button>
            <button id="close-btn">Close</button>
        </form>
    </main>
</body>
</html>
